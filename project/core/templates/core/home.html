{% extends 'base.html' %}

{% block content %}

{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Шансы на бюджет</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background: #f0f0f0; }
        .loading { color: #888; }
    </style>
</head>
<body>
    <h1>Статистика по программам</h1>
    <div id="data-container">
        <p class="loading">Загрузка данных...</p>
    </div>

    <script>
        function refreshData() {
            fetch('/api/programs-stats/')
                .then(response => response.text())
                .then(html => {
                    document.getElementById('data-container').innerHTML = html;
                })
                .catch(err => {
                    console.error('Ошибка обновления:', err);
                    document.getElementById('data-container').innerHTML = '<p style="color:red">Ошибка загрузки данных</p>';
                });
        }
        // Обновляем каждые 15 секунд
        setInterval(refreshData, 15000);
        // Первая загрузка сразу
        refreshData();
    </script>
</body>
</html>


{% endblock %}
